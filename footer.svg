<svg width="850" height="120" viewBox="0 0 850 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradFooter" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbc2eb" />
      <stop offset="10%" stop-color="#a18cd1" />
      <stop offset="20%" stop-color="#96e6a1" />
      <stop offset="30%" stop-color="#f6d365" />
      <stop offset="40%" stop-color="#ff9472" />
      <stop offset="50%" stop-color="#f2709c" />
      <stop offset="60%" stop-color="#ff9472" />
      <stop offset="70%" stop-color="#f6d365" />
      <stop offset="80%" stop-color="#96e6a1" />
      <stop offset="90%" stop-color="#a18cd1" />
      <stop offset="100%" stop-color="#fbc2eb" />
    </linearGradient>
    <style>
      .text-footer { font: bold 22px 'Segoe UI', Ubuntu, sans-serif; fill: #2d3748; text-anchor: middle; text-shadow: 1px 1px 2px rgba(255,255,255,0.8); }
      .subtext-footer { font: 14px 'Segoe UI', Ubuntu, sans-serif; fill: #4a5568; text-anchor: middle; }
      @keyframes moveGradFooter {
        0% { transform: translateX(0%); }
        100% { transform: translateX(-50%); }
      }
      .anim-rect-footer {
        animation: moveGradFooter 15s linear infinite reverse;
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.7; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.02); }
      }
      .pulsing {
        animation: pulse 3s infinite;
        transform-origin: center;
      }
    </style>
  </defs>

  <mask id="maskFooter">
    <rect width="850" height="120" rx="15" fill="white" />
  </mask>

  <g mask="url(#maskFooter)">
    <rect x="0" y="0" width="1700" height="120" fill="url(#bgGradFooter)" class="anim-rect-footer" />
    
    <!-- Tech waves effect -->
    <path d="M 0,100 C 150,130 250,50 425,80 C 600,110 700,40 850,70 L 850,120 L 0,120 Z" fill="rgba(255, 255, 255, 0.4)" />
    <path d="M 0,80 C 200,40 300,110 425,90 C 550,70 650,130 850,90 L 850,120 L 0,120 Z" fill="rgba(255, 255, 255, 0.2)" />
  </g>

  <text x="425" y="55" class="text-footer pulsing">Let's Connect &amp; Build Together!</text>
  <text x="425" y="85" class="subtext-footer">Open for collaborations in Data Science, IoT &amp; Java Development</text>
</svg>
